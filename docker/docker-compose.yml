version: '3.8'

services:
  # PostgreSQL 数据库
  postgres:
    image: postgres:16-alpine
    container_name: emc-lims-postgres
    environment:
      POSTGRES_DB: emc_lims
      POSTGRES_USER: emc_lims
      POSTGRES_PASSWORD: emc_lims_2024
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - emc-lims-network
    restart: unless-stopped

  # Redis 缓存
  redis:
    image: redis:7-alpine
    container_name: emc-lims-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - emc-lims-network
    restart: unless-stopped

  # MinIO 对象存储
  minio:
    image: minio/minio:latest
    container_name: emc-lims-minio
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: emc-lims
      MINIO_ROOT_PASSWORD: emc-lims_2024
    volumes:
      - minio-data:/data
    networks:
      - emc-lims-network
    restart: unless-stopped

volumes:
  postgres-data:
  redis-data:
  minio-data:

networks:
  emc-lims-network:
    driver: bridge
