# 测试环境配置
server:
  port: 8080
  servlet:
    context-path: /api

spring:
  application:
    name: emc-lims-test

  # 测试使用 H2 内存数据库
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    driver-class-name: org.h2.Driver
    username: sa
    password:

  # 启动时加载测试表结构
  sql:
    init:
      mode: always
      schema-locations: classpath:schema.sql

  # Redis 禁用（测试环境不需要）
  data:
    redis:
      host: localhost
      port: 6379
      password:
      database: 0
      timeout: 5000ms

  # Jackson 配置
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
    default-property-inclusion: non_null

mybatis-plus:
  mapper-locations: classpath:mapper/**/*.xml
  global-config:
    db-config:
      id-type: ASSIGN_ID
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
      table-underline: true
  configuration:
    map-underscore-to-camel-case: true

jwt:
  secret: emc-lims-jwt-secret-key-must-be-at-least-256-bits-test
  expiration: 86400000
  refresh-expiration: 604800000

logging:
  level:
    com.emclims: debug
